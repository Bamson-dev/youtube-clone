<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Youtube-clone — clean UI replica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --bg: #0a0a0a;
  --bg-elevated: #121212;
  --surface: #161616;
  --surface-soft: #1d1d1d;
  --text: #f1f1f1;
  --muted: #a8a8a8;
  --accent: #ff3b30;
  --accent-soft: rgba(255, 59, 48, 0.15);
  --radius: 14px;
  --radius-sm: 10px;
  --border: rgba(255, 255, 255, 0.08);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.35);
  --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.45);
  --nav-h: clamp(56px, 12vw, 64px);
  --content-pad: clamp(12px, 4vw, 24px);
  --footer-pad: calc(var(--content-pad) + env(safe-area-inset-bottom, 0px));
}

body[data-theme="light"] {
  --bg: #f5f5f5;
  --bg-elevated: #ffffff;
  --surface: #ffffff;
  --surface-soft: #ececec;
  --text: #0f0f0f;
  --muted: #5c5c5c;
  --border: rgba(0, 0, 0, 0.1);
  --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.08);
  --shadow-card: 0 10px 28px rgba(0, 0, 0, 0.12);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

body {
  margin: 0;
  font-family: "Manrope", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  background-image: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(255, 59, 48, 0.08), transparent 55%);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

button,
input {
  font: inherit;
  color: inherit;
}

a {
  color: inherit;
}

.layout {
  min-height: 100dvh;
  display: grid;
  grid-template-columns: minmax(0, 240px) minmax(0, 1fr);
  /* Must be auto: header includes nav + category strip on Home; a fixed --nav-h row caused overlap */
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "top top"
    "sidebar content"
    "footer footer";
  position: relative;
}

.layout--home {
  --header-stack-h: calc(var(--nav-h) + var(--category-h, 52px));
}

.sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  top: var(--nav-h);
  background: rgba(0, 0, 0, 0.55);
  z-index: 25;
  backdrop-filter: blur(2px);
}

@media (max-width: 960px) {
  .layout.sidebar-open .sidebar-backdrop {
    display: block;
  }

  .layout--home .sidebar-backdrop {
    top: var(--header-stack-h);
  }
}

.site-header {
  grid-area: top;
  position: sticky;
  top: 0;
  z-index: 40;
  align-self: start;
  width: 100%;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
}

body[data-theme="light"] .site-header {
  border-bottom: 1px solid rgba(0, 0, 0, 0.07);
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
}

.top-nav {
  padding: 0 var(--content-pad);
  padding-top: max(0px, env(safe-area-inset-top, 0px));
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

body[data-theme="light"] .top-nav {
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
}

.top-nav-inner {
  max-width: 1920px;
  margin: 0 auto;
  min-height: var(--nav-h);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 10px 14px;
}

.top-nav-left,
.top-nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: clamp(1rem, 2.5vw, 1.15rem);
  font-weight: 700;
  letter-spacing: -0.02em;
}

.brand-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: linear-gradient(145deg, var(--accent), #c41e16);
  color: #fff;
  box-shadow: var(--shadow-sm);
}

.brand-mark svg {
  width: 14px;
  height: 14px;
  margin-left: 2px;
}

.brand-text {
  white-space: nowrap;
}

.search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1 1 280px;
  min-width: 0;
  max-width: min(720px, 100%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-wrap:focus-within {
  border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.search-wrap input {
  border: 0;
  width: 100%;
  min-width: 0;
  outline: 0;
  background: transparent;
  font-size: 0.95rem;
}

.search-wrap input::placeholder {
  color: var(--muted);
}

.sidebar {
  grid-area: sidebar;
  border-right: 1px solid var(--border);
  background: var(--bg-elevated);
  padding: 16px 12px;
}

.sidebar-nav-main {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar-subscriptions {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.sidebar-section-label {
  margin: 0 0 10px 12px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.sidebar-sub-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-sub-channel {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px;
  border-radius: 10px;
  text-align: left;
  border: 0;
  background: transparent;
  color: inherit;
  cursor: pointer;
  font-size: 0.875rem;
  transition: background 0.15s;
}

.sidebar-sub-channel:hover {
  background: var(--surface);
}

.sidebar-sub-name {
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sidebar-show-more {
  margin: 8px 0 0 12px;
  padding: 0;
  border: 0;
  background: none;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
}

.sidebar-show-more:hover {
  color: var(--text);
}

.letter-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  border-radius: 50%;
  font-size: 0.82rem;
  font-weight: 700;
  color: #fff;
  background: var(--letter-bg, #555);
  line-height: 1;
}

.sidebar-link {
  width: 100%;
  text-align: left;
  padding: 11px 12px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.15s, transform 0.15s;
}

.sidebar-link span {
  font-weight: 500;
}

.sidebar-link:hover {
  background: var(--surface);
}

.sidebar-link:active {
  transform: scale(0.98);
}

.sidebar-link.active {
  background: var(--surface);
  color: var(--text);
  font-weight: 600;
  border-left: 3px solid var(--accent);
  padding-left: 9px;
}

body[data-theme="light"] .sidebar-link.active {
  background: #f3f3f3;
}

.content {
  grid-area: content;
  padding: var(--content-pad);
  padding-bottom: clamp(24px, 6vw, 48px);
  max-width: 1920px;
  margin: 0 auto;
  width: 100%;
  min-height: 0;
  position: relative;
  z-index: 0;
}

.category-strip-wrap {
  position: relative;
  z-index: 2;
  /* 12px top + bottom breathing room for tabs */
  padding: 22px var(--content-pad) 22px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  background: color-mix(in srgb, var(--bg) 96%, transparent);
}

body[data-theme="light"] .category-strip-wrap {
  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
}

.category-strip {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 2px 0;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.category-strip::-webkit-scrollbar {
  display: none;
  width: 0;
  height: 0;
}

.category-tab {
  flex: 0 0 auto;
  scroll-snap-align: start;
  border: 0;
  border-radius: 999px;
  padding: 9px 18px;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, transform 0.15s;
  background: #1e1e1e;
  color: #f5f5f5;
}

.category-tab:hover {
  background: #2a2a2a;
}

.category-tab.active {
  background: #ffffff;
  color: #0a0a0a;
}

body[data-theme="light"] .category-tab {
  background: #2a2a2a;
  color: #f5f5f5;
}

body[data-theme="light"] .category-tab.active {
  background: #ffffff;
  color: #0a0a0a;
}

.home-hero-banner {
  position: relative;
  z-index: 0;
  margin: 0 calc(-1 * var(--content-pad)) 28px;
  width: calc(100% + 2 * var(--content-pad));
  /* Taller box + top-aligned content: avoids clipping title under overflow:hidden.
     Keep ~40% shorter than original hero while still showing the background. */
  min-height: clamp(180px, 23vh, 260px);
  border-radius: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  text-align: center;
  padding-top: clamp(20px, 4vw, 36px);
  padding-bottom: clamp(22px, 4vw, 40px);
  box-sizing: border-box;
}

.home-hero-blur {
  position: absolute;
  inset: -30px;
  background-image: var(--hero-image);
  background-size: cover;
  background-position: center;
  /* Slightly lighter blur so the thumbnail is actually visible behind overlay */
  filter: blur(18px) saturate(1.2);
  transform: scale(1.08);
}

.home-hero-overlay {
  position: absolute;
  inset: 0;
  /* Strong, even darkening so text stays readable on any thumbnail */
  background: rgba(0, 0, 0, 0.6);
}

.home-hero-inner {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 var(--content-pad);
  flex: 0 0 auto;
}

.home-hero-label {
  margin: 0 0 6px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: rgba(255, 255, 255, 0.85);
}

.home-hero-title {
  margin: 0 0 8px;
  font-size: clamp(1.05rem, 2.8vw, 1.45rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.35;
  color: #ffffff;
  text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  /* Prevent descenders / line box from clipping at top */
  padding-top: 2px;
}

.home-hero-channel {
  margin: 0 0 4px;
  font-size: 0.9rem;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.92);
}

.home-hero-views {
  margin: 0 0 14px;
  font-size: 0.85rem;
  color: rgba(255, 255, 255, 0.75);
}

.home-hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.btn-hero-primary,
.btn-hero-secondary {
  border-radius: 999px;
  padding: 9px 22px;
  font-weight: 600;
  font-size: 0.88rem;
  cursor: pointer;
  border: 1px solid transparent;
  transition: transform 0.15s, filter 0.2s;
}

.btn-hero-primary {
  background: #ffffff;
  color: #0a0a0a;
}

.btn-hero-primary:hover {
  filter: brightness(0.95);
}

.btn-hero-secondary {
  background: rgba(255, 255, 255, 0.12);
  color: #ffffff;
  border-color: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(8px);
}

.btn-hero-secondary:hover {
  background: rgba(255, 255, 255, 0.2);
}

.btn-primary,
.btn-ghost {
  border-radius: 999px;
  padding: 10px 20px;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  border: 1px solid transparent;
  transition: transform 0.15s, filter 0.2s, background 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: color-mix(in srgb, var(--accent) 80%, #000);
}

.btn-primary:hover {
  filter: brightness(1.08);
}

.btn-ghost {
  background: var(--surface-soft);
  color: var(--text);
  border-color: var(--border);
}

.btn-ghost:hover {
  background: var(--surface);
}

.btn-sm {
  padding: 7px 14px;
  font-size: 0.82rem;
}

.home-rail-wrap {
  margin-bottom: clamp(18px, 4vw, 28px);
}

.rail-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.rail-heading {
  margin: 0;
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.rail-link {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--accent);
}

.rail-scroll {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding: 4px 2px 12px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.rail-card {
  flex: 0 0 min(220px, 72vw);
  scroll-snap-align: start;
}

.rail-thumb {
  border-radius: 12px;
}

.rail-card-title {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  font-size: 0.9rem;
}

.rail-card-meta {
  margin-top: 8px;
  min-width: 0;
}

.page-header {
  margin-bottom: clamp(18px, 3vw, 28px);
}

.page-title {
  margin: 0 0 8px;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 800;
  letter-spacing: -0.04em;
}

.page-lead {
  margin: 0;
  max-width: 56ch;
  color: var(--muted);
  line-height: 1.55;
  font-size: clamp(0.9rem, 2vw, 1rem);
}

.explore-top-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.chip {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}

.chip:hover {
  background: var(--surface-soft);
  border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
}

.explore-block {
  margin-bottom: clamp(28px, 5vw, 40px);
}

.explore-block-head {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.explore-block-title {
  margin: 0 0 4px;
  font-size: 1.1rem;
  font-weight: 700;
}

.explore-block-blurb {
  margin: 0;
  color: var(--muted);
  font-size: 0.9rem;
  max-width: 42ch;
}

.explore-row {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 8px;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
}

.explore-row .rail-card {
  flex: 0 0 min(200px, 65vw);
}

.shorts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 16px;
}

.shorts-tile {
  border: 0;
  padding: 0;
  background: transparent;
  color: inherit;
  cursor: pointer;
  text-align: left;
  border-radius: 14px;
  transition: transform 0.2s;
}

.shorts-tile:hover {
  transform: translateY(-3px);
}

.shorts-frame {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  aspect-ratio: 9 / 16;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}

.shorts-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.shorts-views {
  position: absolute;
  bottom: 8px;
  left: 8px;
  font-size: 0.72rem;
  font-weight: 600;
  background: rgba(0, 0, 0, 0.75);
  color: #fff;
  padding: 3px 8px;
  border-radius: 6px;
}

.shorts-caption {
  margin: 8px 4px 0;
  font-size: 0.82rem;
  font-weight: 600;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.library-layout {
  display: flex;
  flex-direction: column;
  gap: clamp(24px, 4vw, 36px);
}

.library-panel-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 14px;
  font-size: 1.05rem;
  font-weight: 700;
}

.library-panel-title svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

.playlist-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.playlist-row {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  color: inherit;
  transition: background 0.2s;
}

.playlist-row:hover {
  background: var(--surface-soft);
}

.playlist-cover {
  width: 96px;
  height: 54px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  background: #000;
}

.playlist-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.playlist-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.playlist-name {
  font-weight: 600;
  font-size: 0.95rem;
}

.library-mini-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 220px), 1fr));
  gap: 18px;
}

.empty-inline {
  margin: 0;
  padding: 12px 0;
}

.sub-channel-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.sub-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px 6px 6px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}

.sub-pill img {
  border-radius: 50%;
  object-fit: cover;
}

.sub-pill:hover {
  background: var(--surface-soft);
}

.sub-feed-block {
  margin-bottom: 28px;
}

.sub-feed-head {
  margin-bottom: 12px;
}

.sub-channel {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  border: 0;
  background: transparent;
  color: inherit;
  cursor: pointer;
  padding: 4px 0;
}

.sub-avatar {
  border-radius: 50%;
  border: 2px solid var(--border);
}

.sub-name {
  font-weight: 700;
  font-size: 1.05rem;
}

.sub-feed-row {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 6px;
  -webkit-overflow-scrolling: touch;
}

.sub-feed-row .rail-card {
  flex: 0 0 min(200px, 70vw);
}

@media (max-width: 640px) {
  .home-hero-actions {
    width: 100%;
  }

  .btn-hero-primary,
  .btn-hero-secondary {
    flex: 1;
    justify-content: center;
  }
}

.filter-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 2px 16px;
  margin: 0 -4px;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}

.filter-tabs::-webkit-scrollbar {
  height: 4px;
}

.filter-pill {
  flex: 0 0 auto;
  scroll-snap-align: start;
  border: 0;
  border-radius: 999px;
  background: var(--surface);
  color: var(--text);
  padding: 9px 16px;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  transition: background 0.2s, transform 0.15s;
}

.filter-pill:hover {

function parseRoute() {
  const hash = window.location.hash.replace("#", "") || "/";
  const [path, queryString] = hash.split("?");
  const query = new URLSearchParams(queryString || "");
  return { path, query };
}

function applyMobileLockClass() {
  try {
    const params = new URLSearchParams(window.location.search || "");
    const byQuery = params.get("mobile") === "1";
    const byFilename = /\/mobile\.html$/i.test(window.location.pathname || "");
    const forced = byQuery || byFilename;
    const coarsePointer = window.matchMedia("(hover: none) and (pointer: coarse)").matches;
    const ua = navigator.userAgent || "";
    const uaMobile = /iPhone|iPad|iPod|Android|Mobile|CriOS|FxiOS/i.test(ua);
    const touchCapable = coarsePointer || navigator.maxTouchPoints > 0 || "ontouchstart" in window;
    const vv = window.visualViewport?.width || Infinity;
    const viewport = Math.min(window.innerWidth || Infinity, window.screen?.width || Infinity, vv);
    const shouldLock = forced || (touchCapable && (uaMobile || viewport <= 1024));
    document.body.classList.toggle("mobile-lock", shouldLock);
  } catch (error) {
    // Ignore unsupported browser capabilities checks.
  }
}

function enforceViewportForMobileLock() {
  try {
    const locked = document.body.classList.contains("mobile-lock");
    if (!locked) return;
    let viewportMeta = document.querySelector('meta[name="viewport"]');
    if (!viewportMeta) {
      viewportMeta = document.createElement("meta");
      viewportMeta.name = "viewport";
      document.head.appendChild(viewportMeta);
    }
    viewportMeta.content = "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover";
  } catch (error) {
    // Ignore viewport enforcement failures.
  }
}

function navigate(path) {
  window.location.hash = path;
}

window.addEventListener("resize", () => {

}

function setStoredTheme(theme) {

}

function channelInitial(name) {
  const trimmed = String(name || "").replace(/^The\s+/i, "").trim();
  return (trimmed.charAt(0) || "?").toUpperCase();
}

function hueForSeed(seed) {
  let h = 0;
  const s = String(seed);
  for (let i = 0; i < s.length; i += 1) {
    h = s.charCodeAt(i) + ((h << 5) - h);
  }
  return Math.abs(h) % 360;
}

function letterAvatarHtml(name, seed) {
  const letter = channelInitial(name);
  const hue = hueForSeed(seed || name);
  const bg = `hsl(${hue} 58% 42%)`;
  return `<span class="letter-avatar" style="--letter-bg:${bg}" aria-hidden="true">${letter}</span>`;
}

        ${filterTabs
          .map(

          <button type="button" class="category-tab ${tab === state.homeFilter ? "active" : ""}" data-action="homeFilter" data-value="${tab}" role="tab" aria-selected="${tab === state.homeFilter}">
            ${tab}
          </button>
        `
          )
          .join("")}
      </div>
    </div>
  `;
}

  if (!subSidebarList.length) return "";
  return `
    <div class="sidebar-subscriptions">
      <p class="sidebar-section-label">Subscriptions</p>
      <div class="sidebar-sub-list">
        ${subSidebarList
          .map(
            (ch) => `
          <button type="button" class="sidebar-sub-channel text-btn" data-to="/channel?id=${ch.id}">
            ${letterAvatarHtml(ch.name, ch.id)}
            <span class="sidebar-sub-name">${ch.name}</span>
          </button>
        `
          )
          .join("")}
      </div>
      <button type="button" class="sidebar-show-more">Show more</button>
    </div>
  `;
}

function navClass(path) {
  const p = state.route.path;
  if (path === "/" && p === "/") return "active";
  if (path !== "/" && p === path) return "active";
  return "";
}

function getChannel(channelId) {
  const found = channels.find((channel) => channel.id === channelId);
  if (found) return found;
  return {
    id: channelId,
    name: "Creator",
    subscribers: "Channel",
    avatar:
      "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=200&q=80",
    banner:
      channels[0]?.banner ||
      "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1800&q=80",
    about: ""
  };
}

function card(video) {
  return `
    <article class="video-card" data-video="${video.id}">
      <button class="thumbnail-btn" data-to="/watch?v=${video.id}" aria-label="Open ${video.title}">
        <img src="${video.thumbnail}" alt="" loading="lazy" />
        <span class="duration-pill">${video.duration}</span>
      </button>
      <div class="video-card-details">
        <div class="video-card-meta-row">
          ${letterAvatarHtml(video.channelName, video.channelId)}
          <div class="video-meta-stack">
            <button class="text-btn video-card-title" data-to="/watch?v=${video.id}">${video.title}</button>
            <button class="text-btn video-card-channel" data-to="/channel?id=${video.channelId}">${video.channelName}</button>
            <p class="video-card-stats"><span>${video.views}</span><span class="video-stat-sep">·</span><span>${video.uploadedAt}</span></p>
          </div>
        </div>
      </div>
    </article>
  `;
}

function appShell(content, pageClass = "") {
  const isDark = state.theme === "dark";
  const queryValue = state.route.query.get("q") || "";

  const onHome = state.route.path === "/";

  return `
    <div class="layout ${state.sidebarOpen ? "sidebar-open" : ""} ${onHome ? "layout--home" : ""}">
      <div class="sidebar-backdrop" data-action="closeSidebar" aria-hidden="true"></div>
      <header class="site-header">
        <div class="top-nav">
          <div class="top-nav-inner">
            <div class="top-nav-left">
              <button class="icon-btn" data-action="toggleSidebar" aria-label="Toggle sidebar">
                ${icon("menu")}
              </button>
              <button class="brand text-btn" data-to="/" aria-label="Youtube-clone home">
                <span class="brand-mark" aria-hidden="true">${icon("play")}</span>
                <span class="brand-text">Youtube-clone</span>
              </button>
            </div>
            <form class="search-wrap" data-action="searchSubmit" role="search">
              ${icon("search")}
              <input value="${queryValue}" type="search" placeholder="Search" name="q" autocomplete="off" enterkeyhint="search" />
            </form>
            <div class="top-nav-right">
              <button class="icon-btn" data-action="toggleTheme" aria-label="Toggle theme">
                ${isDark ? icon("sun") : icon("moon")}
              </button>
              <button class="profile-chip" type="button">${icon("user")}<span class="profile-label">You</span></button>
            </div>
          </div>
        </div>
        ${categoryStripHtml()}
      </header>
      <aside class="sidebar" aria-label="Main navigation">
        <nav class="sidebar-nav-main">
          <button class="sidebar-link text-btn ${navClass("/")}" data-to="/">${icon("home")}<span>Home</span></button>
          <button class="sidebar-link text-btn ${navClass("/explore")}" data-to="/explore">${icon("compass")}<span>Explore</span></button>
          <button class="sidebar-link text-btn ${navClass("/shorts")}" data-to="/shorts">${icon("bolt")}<span>Shorts</span></button>
          <button class="sidebar-link text-btn ${navClass("/subscriptions")}" data-to="/subscriptions">${icon("subs")}<span>Subscriptions</span></button>
          <button class="sidebar-link text-btn ${navClass("/library")}" data-to="/library">${icon("libraryIcon")}<span>Library</span></button>
        </nav>
        ${subscriptionSidebarHtml()}
      </aside>
      <main class="content ${pageClass}">
        ${content}
      </main>
      <footer class="site-footer">
        <div class="footer-inner">
          <span class="footer-brand">Youtube-clone</span>
          <nav class="footer-links" aria-label="Footer">
            <a href="#" class="footer-link">About</a>
            <a href="#" class="footer-link">Press</a>
            <a href="#" class="footer-link">Copyright</a>
            <a href="#" class="footer-link">Contact</a>
          </nav>
          <p class="footer-note">Portfolio demo · No affiliation with YouTube</p>
        </div>
      </footer>
    </div>
  `;
}

function railCard(video) {
  const ch = getChannel(video.channelId);
  return `
    <article class="rail-card">
      <button class="thumbnail-btn rail-thumb" data-to="/watch?v=${video.id}" aria-label="${video.title}">
        <img src="${video.thumbnail}" alt="" loading="lazy" />
        <span class="duration-pill">${video.duration}</span>
      </button>
      <div class="rail-card-meta">
        <button class="text-btn title-link rail-card-title" data-to="/watch?v=${video.id}">${video.title}</button>
        <p class="muted">${ch.name}</p>
      </div>
    </article>
  `;
}

function homePage() {
  const filtered = state.homeFilter === "All"
    ? videos
    : videos.filter((video) => video.category === state.homeFilter);

  const featured = getVideoById(featuredVideoId) || videos[0];
  const featCh = featured ? getChannel(featured.channelId) : null;
  const heroBg = featured?.thumbnail || "";

  return appShell(
    `
      ${
        featured && featCh
          ? `
      <section class="home-hero-banner" style="--hero-image: url('${heroBg}')" aria-labelledby="hero-title">
        <div class="home-hero-blur" aria-hidden="true"></div>
        <div class="home-hero-overlay" aria-hidden="true"></div>
        <div class="home-hero-inner">
          <p class="home-hero-label" id="hero-kicker">Featured</p>
          <h2 class="home-hero-title" id="hero-title">${featured.title}</h2>
          <p class="home-hero-channel">${featCh.name}</p>
          <p class="home-hero-views">${featured.views}</p>
          <div class="home-hero-actions">
            <button type="button" class="btn-hero-primary" data-to="/watch?v=${featured.id}">Watch</button>
            <button type="button" class="btn-hero-secondary" data-to="/explore">Browse Explore</button>
          </div>
        </div>
      </section>
      `

        ${filtered.map(card).join("")}

    `,
    "home-page"
  );
}

function explorePage() {
  const blocks = exploreRows
    .map(
      (col) => `
      <section class="explore-block">
        <header class="explore-block-head">
          <div>
            <h2 class="explore-block-title">${col.name}</h2>

          <button type="button" class="btn-ghost btn-sm" data-to="/search?q=${encodeURIComponent(col.name)}">Open topic</button>

    `

        <h1 class="page-title">Explore</h1>
        <p class="page-lead">Jump into themed rows—same catalog, organized like a real browse experience.</p>

        ${filterTabs
          .filter((t) => t !== "All")

}

function shortsPage() {
  const list = shortsList
    .map((id) => getVideoById(id))

  return appShell(
    `
      <header class="page-header">
        <h1 class="page-title">Shorts</h1>
        <p class="page-lead">Vertical feed preview—tap any tile to open the watch page.</p>
      </header>
      <section class="shorts-grid" aria-label="Shorts">
        ${list
          .map(
            (video) => `
          <button type="button" class="shorts-tile" data-to="/watch?v=${video.id}">
            <div class="shorts-frame">
              <img src="${video.thumbnail}" alt="" loading="lazy" />
              <span class="shorts-views">${video.views}</span>
            </div>
            <p class="shorts-caption">${video.title}</p>
          </button>
        `

          .join("")}

    "shorts-page"
  );
}

function libraryPage() {
  const historyItems = historyIds.map((id) => getVideoById(id)).filter(Boolean);
  const likedItems = likedIds.map((id) => getVideoById(id)).filter(Boolean);

  return appShell(
    `
      <header class="page-header">
        <h1 class="page-title">Library</h1>
        <p class="page-lead">History, playlists, and likes—structured like the real app.</p>
      </header>
      <div class="library-layout">
        <section class="library-panel">
          <h2 class="library-panel-title">${icon("list")} Playlists</h2>
          <ul class="playlist-list">
            ${playlistData
              .map((pl) => {
                const cover = getVideoById(pl.coverVideoId);
                const thumb = cover?.thumbnail || "";
                return `
              <li>
                <button type="button" class="playlist-row" data-to="/watch?v=${pl.coverVideoId}">
                  <span class="playlist-cover"><img src="${thumb}" alt="" /></span>
                  <span class="playlist-info">
                    <span class="playlist-name">${pl.title}</span>

              </li>

        </section>
        <section class="library-panel">
          <h2 class="library-panel-title">History</h2>

function subscriptionsPage() {
  const rows = channels
    .map((ch) => {
      const latest = videos.filter((v) => v.channelId === ch.id).slice(0, 3);
      return `
      <section class="sub-feed-block">
        <header class="sub-feed-head">
          <button type="button" class="sub-channel" data-to="/channel?id=${ch.id}">
            <img class="sub-avatar" src="${ch.avatar}" alt="" width="40" height="40" />
            <span class="sub-name">${ch.name}</span>
            <span class="muted sub-subs">${ch.subscribers}</span>
          </button>
        </header>
        <div class="sub-feed-row">
          ${latest.map(railCard).join("")}
        </div>
      </section>
    `;
    })
    .join("");

  return appShell(
    `
      <header class="page-header">
        <h1 class="page-title">Subscriptions</h1>
        <p class="page-lead">Latest uploads from channels you follow—one row per creator.</p>
      </header>
      <div class="sub-channel-strip" aria-label="Subscribed channels">
        ${channels
          .map(
            (ch) => `
          <button type="button" class="sub-pill" data-to="/channel?id=${ch.id}">
            <img src="${ch.avatar}" alt="" width="32" height="32" />
            <span>${ch.name}</span>
          </button>
        `
          )
          .join("")}
      </div>
      ${rows}
    `,

  );
}

  return appShell(
    `
      <section class="watch-layout">
        <article class="player-column">
          <div class="player-wrap">
            <iframe
              src="https://www.youtube.com/embed/${activeVideo.embedId}"
              title="${activeVideo.title}"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>
          <h1 class="watch-title">${activeVideo.title}</h1>
          <p class="watch-stats muted">${activeVideo.views} · ${activeVideo.uploadedAt}</p>
          <div class="watch-meta-row">
            <div class="watch-channel-block">
              <img class="watch-channel-avatar" src="${channel.avatar}" alt="" width="40" height="40" />
              <div>
                <button class="text-btn channel-link lg" data-to="/channel?id=${channel.id}">${channel.name}</button>
                <p class="muted">${channel.subscribers}</p>
              </div>
              <button type="button" class="subscribe-btn subscribe-btn-inline">Subscribe</button>
            </div>
            <div class="actions-row">
              <button type="button" class="action-btn" aria-label="Like">${icon("like")}<span class="action-label">Like</span></button>
              <button type="button" class="action-btn" aria-label="Dislike">${icon("dislike")}<span class="action-label">Dislike</span></button>
              <button type="button" class="action-btn action-btn-share" aria-label="Share">${icon("share")}<span class="action-label">Share</span></button>
            </div>
          </div>
          <details class="description-box">
            <summary>Description</summary>
            <p>${activeVideo.description}</p>
            <p class="muted">${activeVideo.views} • ${activeVideo.uploadedAt}</p>
          </details>
          <section class="comments-wrap">
            <h2>Comments</h2>
            ${comments
              .map(
                (comment) => `
                  <article class="comment-item">
                    <p><strong>${comment.user}</strong> <span class="muted">• ${comment.age}</span></p>
                    <p>${comment.text}</p>
                  </article>
                `
              )
              .join("")}

        </article>
        <aside class="recommend-column">
          <h3>Up Next</h3>

            .map(
              (video) => `
                <article class="recommend-card">
                  <button class="thumbnail-btn small" data-to="/watch?v=${video.id}">
                    <img src="${video.thumbnail}" alt="${video.title}" loading="lazy" />
                    <span class="duration-pill">${video.duration}</span>
                  </button>
                  <div>
                    <button class="text-btn title-link sm" data-to="/watch?v=${video.id}">${video.title}</button>
                    <button class="text-btn channel-link" data-to="/channel?id=${video.channelId}">${video.channelName}</button>

              `

            .join("")}

      </section>
    `,
    "watch-page"
  );
}

  const results = videos.filter((video) =>
    `${video.title} ${video.channelName} ${video.category}`.toLowerCase().includes(query)
  );

  return appShell(
    `
      <section class="result-filters">
        <button class="ghost-pill">Upload date</button>
        <button class="ghost-pill">Type</button>
        <button class="ghost-pill">Duration</button>
        <button class="ghost-pill">Sort by</button>
      </section>
      <section class="results-list">
        ${results
          .map(
            (video) => `
              <article class="result-item">
                <button class="thumbnail-btn result" data-to="/watch?v=${video.id}">
                  <img src="${video.thumbnail}" alt="${video.title}" loading="lazy" />
                  <span class="duration-pill">${video.duration}</span>
                </button>
                <div class="result-info">
                  <button class="text-btn title-link lg" data-to="/watch?v=${video.id}">${video.title}</button>
                  <p class="muted">${video.views} • ${video.uploadedAt} • ${video.category}</p>
                  <button class="text-btn channel-link" data-to="/channel?id=${video.channelId}">${video.channelName}</button>
                  <p>${video.description}</p>
                </div>
              </article>
            `
          )
          .join("")}
        ${results.length === 0 ? `<p class="empty-state">No videos matched your search.</p>` : ""}
      </section>
    `,
    "search-page"
  );
}

function channelPage() {
  const id = state.route.query.get("id") || channels[0].id;
  const channel = getChannel(id);
  const channelVideos = videos.filter((video) => video.channelId === channel.id);

  return appShell(
    `
      <section class="channel-head">
        <img class="channel-banner" src="${channel.banner}" alt="${channel.name} banner" />
        <div class="channel-meta">
          <img class="channel-avatar" src="${channel.avatar}" alt="${channel.name}" />
          <div>
            <h1>${channel.name}</h1>
            <p class="muted">${channel.subscribers}</p>
          </div>
          <button class="subscribe-btn">Subscribe</button>
        </div>
        <div class="channel-tabs">
          <button class="tab-btn active">Videos</button>
          <button class="tab-btn">Playlists</button>
          <button class="tab-btn">About</button>
        </div>
      </section>
      <section class="video-grid">
        ${channelVideos.map(card).join("")}
      </section>
      <section class="about-panel">
        <h3>About</h3>
        <p>${channel.about}</p>
      </section>
    `,
    "channel-page"
  );
}

function notFoundPage() {
  return appShell(
    `
      <section class="empty-state">
        <h1>Page not found</h1>
        <p>Return home to continue browsing.</p>
        <button class="action-btn" data-to="/">Go home</button>
      </section>
    `
  );
}

function getView() {
  switch (state.route.path) {
    case "/":
      return homePage();
    case "/explore":
      return explorePage();
    case "/shorts":
      return shortsPage();
    case "/library":
      return libraryPage();
    case "/subscriptions":
      return subscriptionsPage();
    case "/watch":
      return watchPage();
    case "/search":
      return searchPage();
    case "/channel":
      return channelPage();
    default:
      return notFoundPage();
  }
}

function attachHandlers() {
  app.querySelectorAll("[data-to]").forEach((node) => {
    node.addEventListener("click", () => {
      navigate(node.dataset.to);
      state.sidebarOpen = false;
    });
  });

  app.querySelectorAll('[data-action="homeFilter"]').forEach((node) => {
    node.addEventListener("click", () => {
      state.homeFilter = node.dataset.value;
      render();
    });
  });

  const sidebarTrigger = app.querySelector('[data-action="toggleSidebar"]');
  if (sidebarTrigger) {
    sidebarTrigger.addEventListener("click", () => {
      state.sidebarOpen = !state.sidebarOpen;
      render();
    });
  }

  const sidebarBackdrop = app.querySelector('[data-action="closeSidebar"]');
  if (sidebarBackdrop) {
    sidebarBackdrop.addEventListener("click", () => {
      state.sidebarOpen = false;
      render();
    });
  }

  const themeTrigger = app.querySelector('[data-action="toggleTheme"]');
  if (themeTrigger) {
    themeTrigger.addEventListener("click", () => {
      state.theme = state.theme === "dark" ? "light" : "dark";
      setStoredTheme(state.theme);
      document.body.dataset.theme = state.theme;
      render();
    });
  }

  const form = app.querySelector('[data-action="searchSubmit"]');
  if (form) {
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const input = form.querySelector('input[name="q"]');
      navigate(`/search?q=${encodeURIComponent(input.value.trim())}`);
    });
  }
}

function render() {
  if (!app) return;
  if (!Array.isArray(videos) || !Array.isArray(channels) || !Array.isArray(filterTabs) || !Array.isArray(comments)) {
    app.innerHTML = `
      <section class="empty-state" style="margin: 24px;">
        <h1>Unable to load app data</h1>
        <p>Refresh the page. If this persists, open this folder using a local server.</p>
      </section>
    `;
    return;
  }
  app.innerHTML = getView();
  attachHandlers();
}

render();

    </script>
  </body>
